# GitLab CI — CalVer Version Bump
# Einbinden in .gitlab-ci.yml:
#   include:
#     - local: '.gitlab/bump-version-calver.yml'
#
# Benötigt: CI/CD Variable CI_BUMP_TOKEN (Project Access Token mit write_repository)

bump-version:
  stage: release
  image: node:20-alpine

  rules:
    # Nur auf main, nicht bei version-bump Commits
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

  before_script:
    - apk add --no-cache git bash
    - git config user.email "gitlab-ci@${CI_SERVER_HOST}"
    - git config user.name "GitLab CI"
    # Remote mit Token konfigurieren für Push
    - git remote set-url origin "https://oauth2:${CI_BUMP_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"

  script:
    - bash scripts/bump-version-calver.sh
    - VERSION=$(cat VERSION)
    - git add VERSION VERSION.counter package.json
    - git commit -m "chore: bump version to ${VERSION} [skip ci]"
    - git tag "v${VERSION}"
    - git push origin HEAD:main
    - git push origin "v${VERSION}"
    - echo "Released v${VERSION}"
